<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>已签回执未做回访操作流程</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #F8FAFC;
    color: #1E293B;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 50%, #1E40AF 100%);
    color: #fff;
    padding: 44px 20px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header .back { color: rgba(255,255,255,0.9); text-decoration: none; font-size: 15px; }
  .header h2 { font-size: 17px; font-weight: 600; }
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }
  .btn-link {
    display: block;
    width: 100%;
    max-width: 500px;
    padding: 14px;
    background: linear-gradient(135deg, #2563EB, #1D4ED8);
    color: #fff;
    text-decoration: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    transition: transform 0.2s;
    margin-bottom: 16px;
  }
  .btn-link:active { transform: scale(0.97); }
  .flow-img {
    width: 100%;
    max-width: 500px;
    height: auto;
    border-radius: 12px;
    border: 1px solid #E2E8F0;
    box-shadow: 0 4px 20px rgba(37,99,235,0.08);
  }
  .info-box {
    background: #EFF6FF;
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
    max-width: 500px;
    width: 100%;
    font-size: 13px;
    color: #64748B;
    line-height: 1.7;
  }
  .info-box strong { color: #1D4ED8; }
  .warning-box {
    background: #FEF3C7;
    border-radius: 12px;
    padding: 12px 16px;
    margin-top: 12px;
    max-width: 500px;
    width: 100%;
    font-size: 13px;
    color: #92400E;
    line-height: 1.7;
  }
</style>
</head>
<body>
  <div class="header">
    <a class="back" href="./">← 返回</a>
    <h2>已签回执未做回访</h2>
  </div>
  <div class="content">
    <a class="btn-link" href="https://weixinplatform.newchinalife.com/6kg6Zk" target="_blank">🔗 点击进入回访专属操作链接</a>
    <img class="flow-img" src="files/操作流程/已签回执未做回访操作流程.jpg" alt="已签回执未做回访操作流程图">
    <div class="warning-box">
      ⚠️ <strong>注意：</strong>之前的回执回访链接已失效，请使用上方新链接。
    </div>
    <div class="info-box">
      <strong>操作说明：</strong><br>
      1. 点击上方蓝色按钮进入回访专属链接<br>
      2. 按流程图指引完成回访操作<br>
      3. 如遇链接无法打开，请截图后用微信扫码进入<br><br>
      <strong>适用场景：</strong>客户已签回执但尚未完成回访，需单独做回访操作。
    </div>
  </div>
</body>
</html>
